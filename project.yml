name: FiveThreeOne
options:
  bundleIdPrefix: com.ndrego
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "788PV93CSX"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"

schemes:
  FiveThreeOne:
    build:
      targets:
        FiveThreeOne: all
    run:
      config: Debug
    archive:
      config: Release
  FiveThreeOneTests:
    build:
      targets:
        FiveThreeOneTests: [test]
        FiveThreeOne: [test]
    test:
      config: Debug
      targets:
        - FiveThreeOneTests
  FiveThreeOneWatch:
    build:
      targets:
        FiveThreeOneWatch: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  FiveThreeOne:
    type: application
    platform: iOS
    sources:
      - path: FiveThreeOne
        excludes:
          - "Preview Content"
      - path: FiveThreeOne/Preview Content
        buildPhase: sources
    entitlements:
      path: FiveThreeOne/FiveThreeOne.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ndrego.FiveThreeOne
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        SWIFT_EMIT_LOC_STRINGS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "531 Strength"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "531 Strength reads your heart rate during workouts to track effort and estimate calories burned."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "531 Strength saves your completed workouts and calories to Apple Health."
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: false
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: FiveThreeOneWatch
        embed: true

  FiveThreeOneTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FiveThreeOneTests
    dependencies:
      - target: FiveThreeOne
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ndrego.FiveThreeOne.Tests
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "6.0"

  ScreenshotTests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ScreenshotTests
    dependencies:
      - target: FiveThreeOne
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ndrego.FiveThreeOne.ScreenshotTests
        INFOPLIST_FILE: ScreenshotTests/Info.plist
        GENERATE_INFOPLIST_FILE: false
        TEST_HOST: ""
        TEST_TARGET_NAME: FiveThreeOne
        SWIFT_VERSION: "6.0"

  FiveThreeOneWatch:
    type: application
    platform: watchOS
    sources:
      - path: FiveThreeOneWatch
    entitlements:
      path: FiveThreeOneWatch/FiveThreeOneWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ndrego.FiveThreeOne.watch
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        SWIFT_EMIT_LOC_STRINGS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: "531 Strength"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.ndrego.FiveThreeOne
        INFOPLIST_KEY_NSHealthShareUsageDescription: "531 Strength reads your heart rate during workouts to show recovery status."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "531 Strength saves your workout sessions to Apple Health."
        INFOPLIST_KEY_NSMotionUsageDescription: "531 Strength uses motion data to count your reps during sets."
        INFOPLIST_FILE: FiveThreeOneWatch/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SUPPORTED_PLATFORMS: "watchos watchsimulator"
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
